<script>
// ─────────────────────────────
// DATA
// ─────────────────────────────
const CATS = {
  edition1:       {label:'1ère Édition',          ico:'⭐', q:'carte pokemon 1ère édition 1st edition base set shadowless'},
  magique:        {label:'Cartes Magiques WOTC',  ico:'✨', q:'carte pokemon wizards wotc fossile jungle ancienne vintage holographique'},
  brillant:       {label:'Brillante / Shiny',     ico:'💎', q:'carte pokemon shiny brillante chromatique full art alternate art rare'},
  classeur_ancien:{label:'Classeur Pokémon Ancien',ico:'📒', q:'classeur album pochette pokemon ancien vintage officiel'},
  classeur95:     {label:'Classeur 1995',         ico:'📓', q:'classeur pokemon 1995 nintendo album officiel vintage japonnais'},
  vieille:        {label:'Vieilles Cartes Vintage',ico:'🃏', q:'vieille carte pokemon vintage base set team rocket neo genesis 1999 2000 holographique'}
};

const KEYWORDS = [
  { id:'kw01', label:'carte pokemon edition 1',           q:'carte pokemon edition 1' },
  { id:'kw02', label:'carte pokemon ED1',                 q:'carte pokemon ED1' },
  { id:'kw03', label:'carte pokemon 1st edition',         q:'carte pokemon 1st edition' },
  { id:'kw04', label:'carte pokemon 1995',                q:'carte pokemon 1995' },
  { id:'kw05', label:'carte pokemon wizard of the coast', q:'carte pokemon wizard of the coast' },
  { id:'kw06', label:'carte pokemon vintage',             q:'carte pokemon vintage' },
  { id:'kw07', label:'carte pokemon ancienne',            q:'carte pokemon ancienne' },
  { id:'kw08', label:'carte pokemon set de base 1995',    q:'carte pokemon set de base 1995' },
  { id:'kw09', label:'carte pokemon shadowless',          q:'carte pokemon shadowless' },
  { id:'kw10', label:'carte pokemon holo edition 1',      q:'carte pokemon holo edition 1' },
  { id:'kw11', label:'carte pokemon rare edition 1',      q:'carte pokemon rare edition 1' },
  { id:'kw12', label:'carte pokemon fr edition 1',        q:'carte pokemon fr edition 1' },
  { id:'kw13', label:'dracaufeu edition 1',               q:'carte pokemon dracaufeu edition 1' },
  { id:'kw14', label:'pikachu edition 1',                 q:'carte pokemon pikachu edition 1' },
  { id:'kw15', label:'carte pokemon 1999 edition 1',      q:'carte pokemon 1999 edition 1' },
  { id:'kw16', label:'carte pokemon 1999 wizard',         q:'carte pokemon 1999 wizard' },
  { id:'kw17', label:'wizard ancienne holo',              q:'carte pokemon wizard ancienne holographique rare' },
];

const PLATNAMES = { vinted:'Vinted', lbc:'Le Bon Coin', ebay:'eBay' };
const GRAD = {
  edition1:'linear-gradient(90deg,#f5c842,#e0a800)',
  magique:'linear-gradient(90deg,#a855f7,#6366f1)',
  brillant:'linear-gradient(90deg,#06b6d4,#3b82f6)',
  classeur_ancien:'linear-gradient(90deg,#f97316,#ef4444)',
  classeur95:'linear-gradient(90deg,#22c55e,#06b6d4)',
  vieille:'linear-gradient(90deg,#94a3b8,#64748b)'
};

let activeKws = new Set(KEYWORDS.map(k => k.id));
let activeCats = new Set(Object.keys(CATS));
let activePlats = new Set(['vinted', 'lbc', 'ebay']);
let threshold = 30;
let maxResults = 8;
let allDeals = [];
let curFilt = 'all';
let lastSearchQuery = 'carte pokemon vintage';

// ─────────────────────────────
// UI INIT
// ─────────────────────────────
function initUI() {
  const catsEl = document.getElementById('catsEl');
  catsEl.innerHTML = '';

  Object.entries(CATS).forEach(([key, value]) => {
    const el = document.createElement('div');
    el.className = 'cat on';
    el.dataset.cat = key;
    el.innerHTML = `<span>${value.ico}</span> ${value.label}`;
    el.onclick = () => {
      if (activeCats.has(key)) {
        activeCats.delete(key);
        el.classList.remove('on');
      } else {
        activeCats.add(key);
        el.classList.add('on');
      }
    };
    catsEl.appendChild(el);
  });

  const kwsEl = document.getElementById('kwsEl');
  kwsEl.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'kw-all';
  allBtn.textContent = 'Tout sélectionner / déselectionner';
  allBtn.onclick = () => {
    const allOn = activeKws.size === KEYWORDS.length;
    activeKws = allOn ? new Set() : new Set(KEYWORDS.map(k => k.id));
    document.querySelectorAll('.kw').forEach(el => {
      el.classList.toggle('on', activeKws.has(el.dataset.id));
    });
  };
  kwsEl.appendChild(allBtn);

  KEYWORDS.forEach(kw => {
    const el = document.createElement('div');
    el.className = 'kw on';
    el.dataset.id = kw.id;
    el.innerHTML = `🔑 ${kw.label}`;
    el.onclick = () => {
      if (activeKws.has(kw.id)) {
        activeKws.delete(kw.id);
        el.classList.remove('on');
      } else {
        activeKws.add(kw.id);
        el.classList.add('on');
      }
    };
    kwsEl.appendChild(el);
  });

  document.querySelectorAll('.plat[data-plat]').forEach(el => {
    const p = el.dataset.plat;
    el.onclick = () => {
      if (activePlats.has(p)) {
        activePlats.delete(p);
        el.classList.remove('on');
        el.style.opacity = '.35';
      } else {
        activePlats.add(p);
        el.classList.add('on');
        el.style.opacity = '1';
      }
    };
  });
}

// ─────────────────────────────
// HELPERS
// ─────────────────────────────
function log(msg, type='') {
  const el = document.getElementById('lines');
  const ts = new Date().toLocaleTimeString('fr-FR', {
    hour:'2-digit',
    minute:'2-digit',
    second:'2-digit'
  });
  el.innerHTML += `<div class="line"><span class="ts">${ts}</span><span class="${type}">${msg}</span></div>`;
  el.scrollTop = el.scrollHeight;
}

const pbar = document.getElementById('pbar');

function progress(n) {
  pbar.style.width = n + '%';
}

function openLog() {
  document.getElementById('slog').classList.add('open');
}

function closeLog() {
  setTimeout(() => {
    document.getElementById('slog').classList.remove('open');
  }, 1500);
}

function toast(t, b, type='info') {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<div class="toast-t">${t}</div><div>${b}</div>`;
  c.appendChild(el);
  setTimeout(() => el.remove(), 5500);
}

function fmt(v) {
  const num = Number(v || 0);
  return num >= 100 ? Math.round(num) + '€' : num.toFixed(2) + '€';
}

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function buildPlatformSearchLinks(query) {
  const q = encodeURIComponent(query || '');
  return {
    ebay: `https://www.ebay.fr/sch/i.html?_nkw=${q}`,
    vinted: `https://www.vinted.fr/catalog?search_text=${q}`,
    lbc: `https://www.leboncoin.fr/recherche?text=${q}`
  };
}

function ensureExternalButtons() {
  if (document.getElementById('btnVinted')) return;

  const actionsBlocks = document.querySelectorAll('.actions');
  if (!actionsBlocks.length) return;

  const extra = document.createElement('div');
  extra.className = 'actions';
  extra.style.marginTop = '-6px';
  extra.innerHTML = `
    <a class="btn-b" id="btnEbay" href="#" target="_blank" rel="noopener">🛒 OUVRIR EBAY</a>
    <a class="btn-b" id="btnVinted" href="#" target="_blank" rel="noopener">🟢 OUVRIR VINTED</a>
    <a class="btn-b" id="btnLbc" href="#" target="_blank" rel="noopener">🟠 OUVRIR LEBONCOIN</a>
  `;

  actionsBlocks[0].insertAdjacentElement('afterend', extra);
}

function updateExternalLinks(query) {
  const links = buildPlatformSearchLinks(query);
  const ebayBtn = document.getElementById('btnEbay');
  const vintedBtn = document.getElementById('btnVinted');
  const lbcBtn = document.getElementById('btnLbc');

  if (ebayBtn) ebayBtn.href = links.ebay;
  if (vintedBtn) vintedBtn.href = links.vinted;
  if (lbcBtn) lbcBtn.href = links.lbc;
}

function buildCurrentSearchQuery() {
  const selectedKeywords = KEYWORDS
    .filter(k => activeKws.has(k.id))
    .map(k => k.label);

  const selectedCats = [...activeCats]
    .map(cat => CATS[cat]?.label)
    .filter(Boolean);

  const parts = [];

  if (selectedKeywords.length) {
    parts.push(selectedKeywords.slice(0, 3).join(' '));
  }

  if (selectedCats.length) {
    parts.push(selectedCats.slice(0, 2).join(' '));
  }

  if (!parts.length) {
    parts.push('carte pokemon vintage');
  }

  return parts.join(' ');
}

function dedupeDeals(deals) {
  const seen = new Set();
  return deals.filter(d => {
    const key = `${String(d.name || '').toLowerCase()}|${String(d.platform || '').toLowerCase()}|${Number(d.foundPrice || 0)}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

// ─────────────────────────────
// API CALLS
// ─────────────────────────────
async function huntOnServer(payload) {
  const res = await fetch('/api/hunt', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });

  if (!res.ok) {
    let errorMessage = 'Erreur serveur';
    try {
      const err = await res.json();
      errorMessage = err?.error || err?.message || errorMessage;
    } catch (_) {}
    throw new Error(errorMessage);
  }

  return res.json();
}

async function reportOnServer(payload) {
  const res = await fetch('/api/report', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });

  if (!res.ok) {
    let errorMessage = 'Erreur génération rapport';
    try {
      const err = await res.json();
      errorMessage = err?.error || err?.message || errorMessage;
    } catch (_) {}
    throw new Error(errorMessage);
  }

  return res.json();
}

// ─────────────────────────────
// HUNT
// ─────────────────────────────
async function startHunt() {
  if (!activePlats.size) {
    toast('⚠️', 'Sélectionnez au moins une plateforme', 'info');
    return;
  }

  lastSearchQuery = buildCurrentSearchQuery();
  updateExternalLinks(lastSearchQuery);

  threshold = parseInt(document.getElementById('threshInput').value, 10) || 30;
  maxResults = parseInt(document.getElementById('maxInput').value, 10) || 8;

  const btn = document.getElementById('huntBtn');
  const rptBtn = document.getElementById('rptBtn');

  btn.disabled = true;
  btn.textContent = '⏳ CHASSE EN COURS...';
  rptBtn.disabled = true;

  document.getElementById('lines').innerHTML = '';
  allDeals = [];
  openLog();
  progress(6);

  try {
    log('🚀 Envoi de la mission au serveur IA...', 'warn');
    log(`🎯 Requête construite: ${lastSearchQuery}`);
    log(`📡 Plateformes sélectionnées: ${[...activePlats].map(p => PLATNAMES[p]).join(', ')}`);
    log(`📉 Seuil: -${threshold}% vs CardMarket`);

    const payload = {
      threshold,
      maxResults,
      activeCats: [...activeCats],
      activePlats: [...activePlats],
      activeKws: [...activeKws],
      searchQuery: lastSearchQuery
    };

    progress(20);
    const data = await huntOnServer(payload);
    progress(78);

    const serverDeals = Array.isArray(data?.deals) ? data.deals : [];
    allDeals = dedupeDeals(serverDeals).sort((a, b) => Number(b.saving || 0) - Number(a.saving || 0));

    log(`📦 ${allDeals.length} deal(s) reçus depuis le serveur`, allDeals.length ? 'ok' : '');
    progress(92);

    renderDeals(allDeals);
    updateStats(allDeals);

    progress(100);
    rptBtn.disabled = false;

    const fires = allDeals.filter(d => d.hot || Number(d.saving || 0) >= 50);

    if (fires.length) {
      log(`🔥 ${fires.length} deal(s) exceptionnel(s) détecté(s)`, 'fi');
      toast('🔥 DEALS EXCEPTIONNELS !', `${fires.length} affaire(s) à −50%+`, 'fire');
    } else if (allDeals.length) {
      toast('✅ Chasse terminée', `${allDeals.length} deal(s) détecté(s)`, 'ok');
    } else {
      toast('🔍 Aucune affaire', 'Essaie un autre seuil ou plus de mots-clés', 'info');
    }
  } catch (err) {
    console.error(err);
    log(`❌ ${err.message || 'Erreur inconnue'}`, 'fi');
    toast('❌ Erreur', err.message || 'Erreur inconnue', 'fire');
    renderDeals([]);
    updateStats([]);
  } finally {
    btn.disabled = false;
    btn.textContent = '⚡ RELANCER LA CHASSE';
    closeLog();
  }
}

// ─────────────────────────────
// REPORT
// ─────────────────────────────
async function generateReport(immediate = false) {
  const panel = document.getElementById('rptPanel');
  const body = document.getElementById('rptBody');
  const dateEl = document.getElementById('rptDate');

  panel.classList.add('show');
  panel.scrollIntoView({ behavior:'smooth', block:'nearest' });
  dateEl.textContent = new Date().toLocaleString('fr-FR');

  if (!allDeals.length) {
    body.innerHTML = 'Aucun deal à analyser pour le moment.';
    return;
  }

  body.innerHTML = `
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <span style="color:var(--muted2);margin-left:10px;font-size:11px">Génération du rapport IA...</span>
    </div>
  `;

  try {
    const data = await reportOnServer({
      deals: allDeals,
      threshold,
      immediate,
      searchQuery: lastSearchQuery,
      activeCats: [...activeCats],
      activePlats: [...activePlats]
    });

    const report = data?.report || data?.content || 'Rapport indisponible.';
    body.innerHTML = `<span style="color:var(--muted2);font-size:9px;letter-spacing:2px">${immediate ? '🚨 RAPPORT IMMÉDIAT' : '📅 RAPPORT JOURNALIER'} — ${new Date().toLocaleString('fr-FR')}</span>\n\n${esc(report)}`;
  } catch (err) {
    console.error(err);
    body.innerHTML = `Rapport IA indisponible.\n\n📊 ${allDeals.length} affaire(s) · meilleure remise: −${allDeals[0]?.saving || 0}% · ${esc(allDeals[0]?.name || 'N/A')}`;
    toast('⚠️ Rapport indisponible', err.message || 'Erreur serveur', 'info');
  }
}

// ─────────────────────────────
// RENDER
// ─────────────────────────────
function filt(type, btn) {
  curFilt = type;
  document.querySelectorAll('.tb').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  renderDeals(allDeals);
}

function renderDeals(deals) {
  const grid = document.getElementById('grid');

  let list = deals;
  if (curFilt === 'hot') list = deals.filter(d => d.hot || Number(d.saving || 0) >= 50);
  else if (curFilt !== 'all') list = deals.filter(d => d.platform === curFilt);

  if (!list.length) {
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-i">${deals.length ? '🔍' : '🎴'}</div>
        <div class="empty-t">${deals.length ? 'AUCUN RÉSULTAT ICI' : 'PRÊT À CHASSER'}</div>
        <div class="empty-s">${deals.length ? 'Essaie un autre filtre.' : 'Lance la chasse pour détecter des bonnes affaires.'}</div>
      </div>
    `;
    return;
  }

  grid.innerHTML = list.slice(0, maxResults + 4).map(d => {
    const pname = PLATNAMES[d.platform] || d.platform || 'Plateforme';
    const links = buildPlatformSearchLinks(d.name || lastSearchQuery);
    const categoryLabel = CATS[d.category]?.label || d.category || 'Carte Pokémon';
    const platformClass =
      d.platform === 'vinted' ? 'pt-vinted' :
      d.platform === 'lbc' ? 'pt-lbc' :
      'pt-ebay';

    return `
      <div class="dc ${d.hot || Number(d.saving || 0) >= 50 ? 'hot' : ''}">
        <div class="dc-bar" style="background:${GRAD[d.category] || 'linear-gradient(90deg,#3b82f6,#8b5cf6)'}"></div>
        <div class="dc-bd">
          <div class="dc-r1">
            <div>
              <div class="dc-nm">${esc(d.name)}</div>
              <div class="dc-sub">${esc(categoryLabel)} · ${esc(d.condition || '—')}</div>
            </div>
            <span class="pt ${platformClass}">${esc(String(pname).toUpperCase())}</span>
          </div>

          <div class="prices">
            <div class="pc">
              <div class="pc-l">CARDMARKET</div>
              <div class="pc-v vcm">${fmt(d.cmPrice)}</div>
            </div>
            <div class="pc">
              <div class="pc-l">ANNONCE</div>
              <div class="pc-v vg">${fmt(d.foundPrice)}</div>
            </div>
            <div class="pc">
              <div class="pc-l">REMISE</div>
              <div class="pc-v vf">−${Math.round(Number(d.saving || 0))}%</div>
            </div>
          </div>

          <div class="sav">
            <span class="sav-l">💰 Économie estimée</span>
            <span class="sav-r">+${fmt(d.savingEuros)}</span>
          </div>

          <div class="dc-ft" style="gap:10px;align-items:flex-start">
            <div class="dc-meta">
              ${d.location ? `<b>${esc(d.location)}</b> ` : ''}${esc(d.posted || '')}
              ${d.seller ? ` · ${esc(d.seller)}` : ''}
              ${d.notes ? `<br><i style="color:var(--muted2)">${esc(d.notes)}</i>` : ''}
              <br>
              <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">
                <a class="btn-go" href="${links.vinted}" target="_blank" rel="noopener">VINTED</a>
                <a class="btn-go" href="${links.lbc}" target="_blank" rel="noopener">LEBONCOIN</a>
                <a class="btn-go" href="${links.ebay}" target="_blank" rel="noopener">EBAY</a>
              </div>
            </div>
            <a class="btn-go" href="${esc(d.url || '#')}" target="_blank" rel="noopener">VOIR →</a>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function updateStats(deals) {
  document.getElementById('sD').textContent = deals.length;

  const maxSavingEuros = deals.length ? Math.max(...deals.map(d => Number(d.savingEuros || 0))) : 0;
  const bestPercent = deals.length ? Math.max(...deals.map(d => Number(d.saving || 0))) : 0;

  document.getElementById('sS').textContent = fmt(maxSavingEuros);
  document.getElementById('sB').textContent = `${Math.round(bestPercent)}%`;
  document.getElementById('sT').textContent = new Date().toLocaleTimeString('fr-FR', {
    hour:'2-digit',
    minute:'2-digit'
  });
}

// ─────────────────────────────
// INIT
// ─────────────────────────────
initUI();
ensureExternalButtons();
updateExternalLinks(lastSearchQuery);
</script>
